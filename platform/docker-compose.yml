version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rhtp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-rhtp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rhtp_local_dev}
      POSTGRES_DB:       ${POSTGRES_DB:-rhtp_platform}
    ports:
      - "5432:5432"
    volumes:
      - rhtp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rhtp_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rhtp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@rhtp.local
      PGADMIN_DEFAULT_PASSWORD: rhtp_admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  rhtp_pgdata:
